# CI for the Rev0 code under src/rev0
name: Node.js CI (Rev0)

on:
  push:
    paths:
      - "src/rev0/**"
      - ".github/workflows/node.js.yml"
  pull_request:
    paths:
      - "src/rev0/**"
      - ".github/workflows/node.js.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/rev0/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/rev0

      - name: Build shared package
        run: npm run build -w shared
        working-directory: src/rev0

      - name: Run shared test suite with coverage
        run: npm run test:coverage -w shared
        working-directory: src/rev0

      - name: Build backend
        run: npm run build -w backend
        working-directory: src/rev0

      - name: Build frontend
        run: npm run build -w frontend
        working-directory: src/rev0

      - name: Upload shared coverage report
        uses: actions/upload-artifact@v4
        with:
          name: shared-coverage
          path: src/rev0/shared/coverage
